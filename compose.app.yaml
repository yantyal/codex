name: career-growth-app

services:
  # 開発中にアプリケーションから接続する MySQL を起動する。
  # Redmine の MySQL と衝突しないよう、PC 側では 3307 番ポートを使う。
  mysql-dev:
    image: mysql:8.4
    restart: unless-stopped
    ports:
      - '127.0.0.1:3307:3306'
    environment:
      MYSQL_DATABASE: career_growth_dev
      MYSQL_USER: career_growth
      MYSQL_PASSWORD: ${APP_DB_PASSWORD:?APP_DB_PASSWORD is required}
      MYSQL_ROOT_PASSWORD: ${APP_DB_ROOT_PASSWORD:?APP_DB_ROOT_PASSWORD is required}
    volumes:
      # コンテナを停止しても開発データが残るよう、Docker volume へ保存する。
      - app_mysql_dev_data:/var/lib/mysql
    healthcheck:
      # MySQL が接続可能になるまで、後続処理を開始しないための確認を行う。
      test:
        - CMD-SHELL
        - mysqladmin ping -h localhost -u career_growth -p$$MYSQL_PASSWORD --silent
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  # マイグレーションと統合テスト専用の MySQL を起動する。
  # 開発データを壊さないよう、開発用とはDB名・ポート・volumeを分離する。
  mysql-test:
    image: mysql:8.4
    restart: unless-stopped
    ports:
      - '127.0.0.1:3308:3306'
    environment:
      MYSQL_DATABASE: career_growth_test
      MYSQL_USER: career_growth
      MYSQL_PASSWORD: ${APP_DB_PASSWORD:?APP_DB_PASSWORD is required}
      MYSQL_ROOT_PASSWORD: ${APP_DB_ROOT_PASSWORD:?APP_DB_ROOT_PASSWORD is required}
    volumes:
      - app_mysql_test_data:/var/lib/mysql
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h localhost -u career_growth -p$$MYSQL_PASSWORD --silent
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

volumes:
  # データを明示的に削除しない限り保持する名前付き volume を定義する。
  app_mysql_dev_data:
  app_mysql_test_data:
