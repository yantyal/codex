name: CI

# master ブランチに push したときと、Pull Request の作成・更新時に実行する。
on:
  push:
    branches:
      - master
  pull_request:

jobs:
  test:
    # GitHub が用意している Ubuntu 環境でテストを実行する。
    runs-on: ubuntu-latest

    steps:
      # リポジトリのコードを CI 環境に取得する。
      - name: Checkout
        uses: actions/checkout@v7

      # テストに使う Node.js 26.4 をセットアップする。
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26.4
          # npm のキャッシュを使い、2回目以降の依存関係インストールを速くする。
          cache: npm

      # package-lock.json を使って、CI でも同じ依存関係をインストールする。
      - name: Install dependencies
        run: npm ci

      # ESLint で、未定義の変数や書き方の問題がないか確認する。
      - name: Run lint
        run: npm run lint

      # Prettier で、コードの見た目がそろっているか確認する。
      - name: Check formatting
        run: npm run format:check

      # Jest でテストを実行し、どれくらいコードを確認できているかを coverage として集計する。
      - name: Run tests with coverage
        run: npm run test:coverage

      # 重大度 high 以上の脆弱性が依存関係にないか確認する。
      - name: Run audit
        run: npm run audit
